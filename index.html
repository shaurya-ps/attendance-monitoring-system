<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

#greeting{
text-align:center;
font-size:28px;
font-weight:600;
margin-top:20px;
}

#clock{
text-align:center;
font-size:16px;
color:#cbd5f5;
margin-top:5px;
}

#lastUpdate{
text-align:center;
font-size:14px;
color:#94a3b8;
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
padding:20px;
transition:all 0.3s ease;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
border:2px solid rgba(139,92,246,0.1);
}

.card:hover{
transform:translateY(-6px);
border:2px solid #8b5cf6;
box-shadow:0 0 15px rgba(139,92,246,0.5);
}

.progress-bar{
width:100%;
height:8px;
background:#374151;
border-radius:10px;
margin:8px 0;
}

.progress{
height:8px;
border-radius:10px;
}

.safe{color:#4ade80;}
.warn{color:#fbbf24;}
.danger{color:#f87171;}

</style>
</head>

<body>

<div id="greeting"></div>
<div id="clock"></div>
<div id="lastUpdate"></div>

<div class="container" id="subjectsContainer"></div>

<script src="script.js"></script>

</body>
</html>S
