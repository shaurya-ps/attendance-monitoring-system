<!DOCTYPE html>
<html>
<head>
<title>Subject Details</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
}

h1 {
    padding: 20px;
}

.chart-container {
    width: 300px;
    height: 200px;
    margin: 40px auto;
}
</style>
</head>

<body>

<h1 id="subjectTitle"></h1>

<div class="chart-container">
    <canvas id="attendanceChart"></canvas>
</div>

<script>

const subjects = JSON.parse(localStorage.getItem("subjectsData"));
const selectedName = localStorage.getItem("selectedSubject");

const subject = subjects.find(s => s.name === selectedName);

document.getElementById("subjectTitle").innerText = subject.name;

const conducted = subject.parts.theory.conducted + subject.parts.lab.conducted;
const attended = subject.parts.theory.attended + subject.parts.lab.attended;

new Chart(document.getElementById("attendanceChart"), {
    type: "bar",
    data: {
        labels: ["Attended", "Missed"],
        datasets: [{
            data: [attended, conducted - attended],
            backgroundColor: ["#22c55e", "#ef4444"],
            borderRadius: 8
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            y: { beginAtZero: true }
        }
    }
});

</script>

</body>
</html>
